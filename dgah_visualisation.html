<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Champ Cognitif</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#070912; --bg2:#0d1430; --ink:#ece9df; --muted:#7a809c;
    --line:#1c2342; --cold:#7aa2ff; --warm:#ff9a6b;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:var(--bg);color:var(--ink);overflow:hidden;
    font-family:"Space Mono",ui-monospace,monospace;-webkit-tap-highlight-color:transparent}
  #stage{position:fixed;inset:0}
  canvas{display:block;width:100%;height:100%}

  /* En-tête */
  .head{position:fixed;top:0;left:0;right:0;padding:18px 20px;pointer-events:none;
    display:flex;justify-content:space-between;align-items:flex-start;gap:16px}
  .title{font-family:"Instrument Serif",serif;font-size:30px;line-height:.95;letter-spacing:.5px}
  .title em{font-style:italic;color:var(--cold)}
  .sub{font-size:10.5px;color:var(--muted);letter-spacing:.4px;margin-top:6px;max-width:230px}

  /* Lectures (instruments) */
  .readout{text-align:right;font-size:10px;color:var(--muted);letter-spacing:.5px}
  .readout .row{display:flex;justify-content:flex-end;align-items:center;gap:8px;margin-bottom:7px}
  .readout b{color:var(--ink);font-weight:700;font-size:13px;min-width:54px;text-align:right}
  .spark{width:64px;height:16px;display:block}
  .bar{width:64px;height:5px;background:var(--line);border-radius:3px;overflow:hidden}
  .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--cold),var(--warm));
    width:100%;transform-origin:left;transition:transform .12s linear}

  /* Contrôles */
  .controls{position:fixed;left:0;right:0;bottom:0;padding:16px 18px calc(16px + env(safe-area-inset-bottom));
    display:flex;flex-direction:column;gap:12px}
  .lam{display:flex;align-items:center;gap:12px;font-size:10px;color:var(--muted);letter-spacing:.5px}
  .lam label{white-space:nowrap}
  input[type=range]{-webkit-appearance:none;appearance:none;flex:1;height:3px;border-radius:3px;
    background:linear-gradient(90deg,var(--cold),var(--warm));outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;
    background:var(--ink);box-shadow:0 0 12px rgba(236,233,223,.6);cursor:pointer}
  input[type=range]::-moz-range-thumb{width:18px;height:18px;border:none;border-radius:50%;
    background:var(--ink);box-shadow:0 0 12px rgba(236,233,223,.6);cursor:pointer}
  .btns{display:flex;gap:10px}
  button{flex:1;font-family:"Space Mono",monospace;font-size:11px;letter-spacing:1px;
    color:var(--ink);background:rgba(255,255,255,.03);border:1px solid var(--line);
    padding:13px 10px;border-radius:11px;cursor:pointer;transition:.18s;text-transform:uppercase}
  button:active{background:rgba(122,162,255,.14);border-color:var(--cold);transform:scale(.98)}

  .note{position:fixed;left:0;right:0;bottom:96px;text-align:center;font-size:9px;
    color:#4a5070;letter-spacing:.6px;pointer-events:none;padding:0 24px}

  @media(min-width:680px){ .title{font-size:38px} .sub{font-size:12px} }
</style>
</head>
<body>
<div id="stage"><canvas id="c"></canvas></div>

<div class="head">
  <div>
    <div class="title">Champ <em>Cognitif</em></div>
    <div class="sub">une géométrie qui se déforme pour prédire — regarde la structure apparaître</div>
  </div>
  <div class="readout">
    <div class="row"><span>énergie</span><canvas class="spark" id="spark"></canvas></div>
    <div class="row"><span>température</span><span class="bar"><i id="tbar"></i></span></div>
    <div class="row"><span>concepts</span><b id="kcount">—</b></div>
    <div class="row"><span>courbure</span><b id="curv">—</b></div>
  </div>
</div>

<div class="note">Dynamique réelle : flot de gradient dissipatif. Ce que tu vois converge vraiment.</div>

<div class="controls">
  <div class="lam">
    <label>couplage géométrique λ</label>
    <input type="range" id="lam" min="0" max="200" value="100">
    <b id="lamv" style="color:var(--ink);min-width:34px;text-align:right">1.0</b>
  </div>
  <div class="btns">
    <button id="perturb">Perturber</button>
    <button id="reseed">Nouveau monde</button>
  </div>
</div>

<script>
const cv = document.getElementById('c'), ctx = cv.getContext('2d');
const sparkC = document.getElementById('spark'), sctx = sparkC.getContext('2d');
let W=0,H=0,DPR=1, S=1, OX=0, OY=0;

function resize(){
  DPR = Math.min(window.devicePixelRatio||1, 2);
  W = window.innerWidth; H = window.innerHeight;
  cv.width = W*DPR; cv.height = H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0);
  S = Math.min(W,H)*0.42; OX = W/2; OY = H/2;
  sparkC.width = 64*DPR; sparkC.height = 16*DPR; sctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener('resize', resize); resize();

const HUES = ['#6ee7ff','#b69cff','#ffd36e','#ff8fb0','#8effc1'];
function hex2rgb(h){return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
const RGB = HUES.map(hex2rgb);

let N, K, comm, P, V, A, deg, tri;
let T, lambda=1.0, energyHist=[], curAvg=0, kCount=0;

function rand(a,b){return a+Math.random()*(b-a);}
function gauss(){let u=0,v=0;while(!u)u=Math.random();while(!v)v=Math.random();
  return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);}

function seedWorld(){
  K = 5; N = 90;
  comm = new Array(N); P = []; V = [];
  for(let i=0;i<N;i++){
    comm[i] = Math.floor(i / (N/K));
    P.push([rand(-1,1), rand(-1,1)]);
    V.push([0,0]);
  }
  const pin=0.5, pout=0.03;
  A = Array.from({length:N}, ()=>[]);
  for(let i=0;i<N;i++) for(let j=i+1;j<N;j++){
    const p = comm[i]===comm[j] ? pin : pout;
    if(Math.random()<p){ A[i].push(j); A[j].push(i); }
  }
  T = 1.0; energyHist = [];
}

function geometry(){
  deg = new Array(N).fill(0); tri = new Array(N).fill(0);
  const nb = A.map(l=>new Set(l));
  for(let i=0;i<N;i++){ deg[i]=A[i].length;
    for(const j of A[i]) if(j>i){ let t=0; for(const x of A[i]) if(nb[j].has(x)) t++; tri[i]+=t; tri[j]+=t; }
  }
}

function step(dt){
  const ka = 0.9*lambda, kr = 0.0010, fric = 0.86, center = 0.012;
  let E = 0;
  const fx = new Array(N).fill(0), fy = new Array(N).fill(0);

  for(let i=0;i<N;i++) for(const j of A[i]) if(j>i){
    const dx=P[j][0]-P[i][0], dy=P[j][1]-P[i][1];
    fx[i]+=ka*dx; fy[i]+=ka*dy; fx[j]-=ka*dx; fy[j]-=ka*dy;
    E += ka*(dx*dx+dy*dy);
  }
  for(let i=0;i<N;i++) for(let j=i+1;j<N;j++){
    const dx=P[i][0]-P[j][0], dy=P[i][1]-P[j][1];
    let d2=dx*dx+dy*dy; if(d2>0.16) continue; d2+=1e-3;
    const f=kr/d2; fx[i]+=f*dx; fy[i]+=f*dy; fx[j]-=f*dx; fy[j]-=f*dy; E+=kr/Math.sqrt(d2);
  }
  for(let i=0;i<N;i++){
    fx[i]-=center*P[i][0]; fy[i]-=center*P[i][1];
    V[i][0]=(V[i][0]+dt*fx[i])*fric + T*0.02*gauss();
    V[i][1]=(V[i][1]+dt*fy[i])*fric + T*0.02*gauss();
    P[i][0]+=V[i][0]; P[i][1]+=V[i][1];
  }
  T = Math.max(0.02, T*0.992);
  energyHist.push(E); if(energyHist.length>120) energyHist.shift();

  let cs=0,ce=0;
  for(let i=0;i<N;i++) for(const j of A[i]) if(j>i){
    cs += 4-deg[i]-deg[j]+3*( (tri[i]+tri[j])/Math.max(1,deg[i]+deg[j]) ); ce++;
  }
  curAvg = ce? cs/ce : 0;
  kCount = countClusters();
}

function countClusters(){
  const R2=0.10, par=[...Array(N).keys()];
  const find=x=>{while(par[x]!==x){par[x]=par[par[x]];x=par[x];}return x;};
  for(let i=0;i<N;i++) for(let j=i+1;j<N;j++){
    const dx=P[i][0]-P[j][0],dy=P[i][1]-P[j][1];
    if(dx*dx+dy*dy<R2){const a=find(i),b=find(j);if(a!==b)par[a]=b;}
  }
  const size={}; for(let i=0;i<N;i++){const r=find(i);size[r]=(size[r]||0)+1;}
  let big=0; for(const r in size) if(size[r]>=4) big++;
  return big;
}

function px(p){return [OX+p[0]*S, OY+p[1]*S];}
function draw(){
  ctx.fillStyle='#070912'; ctx.fillRect(0,0,W,H);
  const g=ctx.createRadialGradient(OX,OY*0.92,0,OX,OY,Math.max(W,H)*0.75);
  g.addColorStop(0,'rgba(20,30,72,.55)'); g.addColorStop(1,'rgba(7,9,18,0)');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  ctx.globalCompositeOperation='lighter';
  for(let i=0;i<N;i++) for(const j of A[i]) if(j>i){
    const a=px(P[i]), b=px(P[j]);
    const dx=P[i][0]-P[j][0], dy=P[i][1]-P[j][1], d=Math.sqrt(dx*dx+dy*dy);
    const al=Math.max(0, 0.5-d*1.6); if(al<=0.01) continue;
    const ci=RGB[comm[i]], cj=RGB[comm[j]];
    ctx.strokeStyle=`rgba(${(ci[0]+cj[0])/2|0},${(ci[1]+cj[1])/2|0},${(ci[2]+cj[2])/2|0},${al})`;
    ctx.lineWidth=0.6; ctx.beginPath(); ctx.moveTo(a[0],a[1]); ctx.lineTo(b[0],b[1]); ctx.stroke();
  }
  for(let i=0;i<N;i++){
    const a=px(P[i]), c=RGB[comm[i]];
    const r=2.6+Math.min(deg[i],10)*0.35;
    const rg=ctx.createRadialGradient(a[0],a[1],0,a[0],a[1],r*4);
    rg.addColorStop(0,`rgba(${c[0]},${c[1]},${c[2]},.95)`);
    rg.addColorStop(.4,`rgba(${c[0]},${c[1]},${c[2]},.35)`);
    rg.addColorStop(1,`rgba(${c[0]},${c[1]},${c[2]},0)`);
    ctx.fillStyle=rg; ctx.beginPath(); ctx.arc(a[0],a[1],r*4,0,7); ctx.fill();
    ctx.fillStyle=`rgba(255,255,255,.9)`; ctx.beginPath(); ctx.arc(a[0],a[1],r*0.5,0,7); ctx.fill();
  }
  ctx.globalCompositeOperation='source-over';
}

function drawSpark(){
  sctx.clearRect(0,0,64,16);
  if(energyHist.length<2) return;
  const mn=Math.min(...energyHist), mx=Math.max(...energyHist), rng=mx-mn||1;
  sctx.strokeStyle='#7aa2ff'; sctx.lineWidth=1; sctx.beginPath();
  energyHist.forEach((e,k)=>{
    const x=k/(energyHist.length-1)*64, y=15-((e-mn)/rng)*14;
    k?sctx.lineTo(x,y):sctx.moveTo(x,y);
  });
  sctx.stroke();
}

const tbar=document.getElementById('tbar'), kc=document.getElementById('kcount'), cu=document.getElementById('curv');
function hud(){
  tbar.style.transform=`scaleX(${Math.min(1,T)})`;
  kc.textContent=kCount; cu.textContent=curAvg.toFixed(1);
}

let last=0;
function loop(t){
  const dt=Math.min(0.05,(t-last)/1000||0.016); last=t;
  geometry(); step(dt); draw(); drawSpark(); hud();
  requestAnimationFrame(loop);
}

const lamEl=document.getElementById('lam'), lamv=document.getElementById('lamv');
lamEl.addEventListener('input',()=>{lambda=lamEl.value/100; lamv.textContent=lambda.toFixed(1);});
document.getElementById('perturb').addEventListener('click',()=>{ T=1.0;
  for(let i=0;i<N;i++){V[i][0]+=gauss()*0.04;V[i][1]+=gauss()*0.04;} });
document.getElementById('reseed').addEventListener('click',seedWorld);
cv.addEventListener('pointerdown',e=>{
  const mx=(e.clientX-OX)/S, my=(e.clientY-OY)/S;
  for(let i=0;i<N;i++){const dx=P[i][0]-mx,dy=P[i][1]-my;const d2=dx*dx+dy*dy;
    if(d2<0.09){const f=0.05/(d2+0.01);V[i][0]+=dx*f;V[i][1]+=dy*f;}}
});

seedWorld(); requestAnimationFrame(loop);
</script>
</body>
</html>
